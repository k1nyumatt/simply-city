<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simply City - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            color: white;
        }

        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }

        .navbar .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #e94560;
        }

        .navbar .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 0.9rem;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .navbar .nav-links a:hover {
            opacity: 1;
        }

        .dashboard-container {
            text-align: center;
            padding: 120px 20px 20px 20px;
        }

        .welcome {
            font-size: 1.1rem;
            opacity: 0.7;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .welcome-name {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .welcome-name span {
            color: #e94560;
        }

        .subtitle {
            font-size: 1rem;
            opacity: 0.6;
            margin-bottom: 50px;
        }

        .search-container {
            position: relative;
            width: 500px;
            max-width: 90vw;
            margin: 0 auto;
        }

        .search-container input {
            width: 100%;
            padding: 18px 60px 18px 25px;
            border-radius: 50px;
            border: none;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 1rem;
            outline: none;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s;
        }

        .search-container input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .search-container input:focus {
            background: rgba(255,255,255,0.15);
            border-color: #e94560;
        }

        .search-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: #e94560;
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }

        .search-btn:hover {
            background: #c73652;
        }

        .quick-links {
            margin-top: 40px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .quick-link {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .quick-link:hover {
            background: #e94560;
            border-color: #e94560;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">Simply City</div>
        <div class="nav-links">
            <a href="{% url 'zones_map' %}">Map</a>
            <a href="{% url 'profile' %}">Profile</a>
            <a href="{% url 'logout' %}">Logout</a>
        </div>
    </nav>

    <div class="dashboard-container">
        <p class="welcome">Welcome back</p>
        <h1 class="welcome-name">Hello, <span>{{ user.username }}</span> 👋</h1>
        <p class="subtitle">Where would you like to go today?</p>

        <form class="search-container" action="{% url 'z
